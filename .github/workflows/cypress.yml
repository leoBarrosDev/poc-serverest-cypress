name: Cypress CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  api-tests:
    name: API Test Suite
    runs-on: ubuntu-latest

    env:
      CI: true
      CYPRESS_CACHE_FOLDER: ~/.cache/Cypress

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API Cypress tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          record: false
          command: >
            npm run test:api --
            --reporter mochawesome
            --reporter-options
            reportDir=cypress/results/api,overwrite=false,html=false,json=true

      - name: Upload API test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-cypress-artifacts
          path: |
            cypress/results/api/**
            cypress/screenshots/**

  frontend-tests:
    name: Frontend E2E Suite
    runs-on: ubuntu-latest

    env:
      CI: true
      CYPRESS_CACHE_FOLDER: ~/.cache/Cypress

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend Cypress tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          browser: chrome
          record: false
          config-file: cypress.config.js

          command: >
            npm run test:frontend --
            --browser chrome
            --reporter mochawesome
            --reporter-options
            reportDir=cypress/results/frontend,overwrite=false,html=false,json=true

      - name: Upload frontend test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-cypress-artifacts
          path: |
            cypress/results/frontend/**
            cypress/screenshots/**